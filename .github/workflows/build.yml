name: build

on:
  push:
    branches: [main, raylib-backend]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Mega Mario
    runs-on: ubuntu-latest
    # raylib backend (this branch): the raylib toolchain variant provides raylib
    # over RSXGL. (main still uses the base ghcr.io/02900/ps3-toolchain image.)
    container:
      image: ghcr.io/02900/ps3-toolchain-raylib:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps3-mega-mario
          # The Makefile names the output after the checkout dir (the repo name),
          # so match by glob rather than a hard-coded filename.
          path: "*.self"
          if-no-files-found: error
